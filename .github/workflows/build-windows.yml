name: build-windows

# Compile un .exe Windows du jeu sur un runner Windows natif (pas de cross-compile
# depuis Linux, trop fragile pour Bevy) et le publie en artefact téléchargeable.
# Déclenché à la MAIN (bouton « Run workflow » dans l'onglet Actions, ou via l'API).

on:
  workflow_dispatch:
    inputs:
      rendezvous:
        description: "Adresse publique du rendez-vous (ex 1.2.3.4:24000) — bakée dans serveur.txt, zéro config utilisateur"
        required: false
        default: ""

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Compiler (release)
        run: cargo build --release

      - name: Empaqueter exe + lanceur
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/jeu.exe dist/
          # Pas de copie d'asset : l'agent est HEADLESS (mesure réseau, zéro 3D), et `asset/`
          # est gitignoré (absent du checkout CI — c'est ce qui faisait planter l'empaquetage).
          # Lanceur de MESURE. L'adresse du rendez-vous se met dans `serveur.txt` posé À CÔTÉ
          # (une ligne, ex 1.2.3.4:24000) → AUCUNE IP dans le dépôt public.
          $bat = @(
            '@echo off',
            'set /p RENDEZVOUS_ADDR=<"%~dp0serveur.txt"',
            'set RELAY_FALLBACK=1',
            'set POW_BITS=18',
            'echo Mesure 60s vers %RENDEZVOUS_ADDR% ... (si vide : cree serveur.txt a cote)',
            '"%~dp0jeu.exe" agent recv 60',
            'pause'
          )
          Set-Content -Path dist/LANCER_mesure.bat -Value $bat -Encoding ascii
          # INSTALLER PERSISTANT (rejoindre la flotte) : démarrage auto (dossier Démarrage, SANS
          # admin), TRÈS basse priorité, et l'agent s'efface quand le PC est occupé. `agent install`
          # copie aussi `serveur.txt` à côté, et l'agent pose lui-même RELAY_FALLBACK/POW_BITS → zéro
          # config pour le pote.
          $inst = @(
            '@echo off',
            'rem === Installeur PROPRE : droits admin (UAC), nettoyage total, install neuve ===',
            '>nul 2>&1 net session',
            'if %errorlevel% neq 0 (',
            '  echo Demande des droits administrateur...',
            '  powershell -Command "Start-Process -FilePath ''%~f0'' -Verb RunAs"',
            '  exit /b',
            ')',
            'cd /d "%~dp0"',
            'echo.',
            'echo === Nettoyage de TOUTES les anciennes versions ===',
            'taskkill /F /IM jeu.exe >nul 2>&1',
            '"%~dp0jeu.exe" agent uninstall >nul 2>&1',
            'del /f /q "%APPDATA%\Microsoft\Windows\Start Menu\Programs\Startup\web3-agent.vbs" >nul 2>&1',
            'schtasks /delete /tn web3-agent /f >nul 2>&1',
            'rmdir /s /q "%LOCALAPPDATA%\web3-agent" >nul 2>&1',
            'echo Anciennes versions supprimees.',
            'echo === Installation PROPRE ===',
            '"%~dp0jeu.exe" agent install',
            'echo.',
            'echo C''est installe PROPREMENT. Agent persistant, TRES basse priorite, se met en retrait si occupe.',
            'pause'
          )
          Set-Content -Path dist/INSTALLER.bat -Value $inst -Encoding ascii
          $des = @(
            '@echo off',
            '"%~dp0jeu.exe" agent uninstall',
            'echo Desinstalle : plus rien ne tourne, plus de demarrage auto.',
            'pause'
          )
          Set-Content -Path dist/DESINSTALLER.bat -Value $des -Encoding ascii
          # Adresse du rendez-vous BAKÉE à la construction (entrée du workflow) → l'utilisateur
          # n'a RIEN à remplir : double-clic et ça vise le serveur. (Pas d'IP dans le dépôt :
          # elle vient de l'input au déclenchement, et n'atterrit que dans l'artefact téléchargé.)
          $rdv = "${{ inputs.rendezvous }}"
          if ($rdv) { Set-Content -Path dist/serveur.txt -Value $rdv -Encoding ascii; Write-Host "serveur.txt baké: $rdv" }

      - name: Publier l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: web3game-windows
          path: dist
